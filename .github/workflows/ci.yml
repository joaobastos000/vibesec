name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: xvfb-run -a npm run test

      - name: Package extension
        run: npm run package --workspace vibin-guard

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vibin-guard-vsix
          path: packages/extension/dist/vibin-guard.vsix
          if-no-files-found: error
          retention-days: 14
